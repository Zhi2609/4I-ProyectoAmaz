<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazing - Tienda en Línea</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">Amazing (No Amazon)</div>
      <nav id="navbar">
        <button id="nav-cart" class="hidden">
          🛒 Carrito <span id="cart-count">(0)</span>
        </button>
        <button id="nav-logout" class="hidden">Cerrar Sesión</button>
      </nav>
    </header>

    <main>
      <section id="auth-view" class="view active">
        <div class="card form-container">
          <h2 id="form-title">Iniciar Sesión</h2>

          <form id="login-form">
            <div class="input-group">
              <label for="login-username">Usuario</label>
              <input
                type="text"
                id="login-username"
                required
                placeholder="Ingresa tu usuario"
              />
            </div>
            <div class="input-group">
              <label for="login-password">Contraseña</label>
              <input
                type="password"
                id="login-password"
                required
                placeholder="Ingresa tu contraseña"
              />
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
          </form>

          <form id="register-form" class="hidden">
            <div class="input-group">
              <label for="reg-username">Nuevo Usuario</label>
              <input
                type="text"
                id="reg-username"
                required
                placeholder="Crea un nombre de usuario"
              />
            </div>
            <div class="input-group">
              <label for="reg-password">Contraseña</label>
              <input
                type="password"
                id="reg-password"
                required
                placeholder="Crea una contraseña"
              />
            </div>
            <div class="input-group">
              <label for="reg-password-confirm">Confirmar Contraseña</label>
              <input
                type="password"
                id="reg-password-confirm"
                required
                placeholder="Repite la contraseña"
              />
            </div>
            <button type="submit" class="btn-primary">Crear Cuenta</button>
          </form>

          <div class="toggle-form">
            <p id="toggle-text">
              ¿No tienes cuenta?
              <a href="#" id="toggle-link">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </section>

      <section id="catalog-view" class="view hidden">
        <div class="catalog-header">
          <h2>Productos Destacados</h2>
        </div>

        <div class="grid" id="products-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
